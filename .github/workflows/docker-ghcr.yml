name: Publish Container Images (GHCR)

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
      - '.github/workflows/docker-ghcr.yml'
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      sandbox: ${{ steps.filter.outputs.sandbox }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sandbox:
              - 'infra/docker/sandbox.Dockerfile'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'prisma/**'
              - 'package.json'
              - 'package-lock.json'
              - 'infra/docker/web.Dockerfile'
              - 'apps/web/next.config.ts'

  sandbox:
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.sandbox == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Registry image name (lowercase)
        id: img
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "sandbox=${{ env.REGISTRY }}/${owner}/novatrix-sandbox" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.sandbox }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/sandbox.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web:
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Registry image name (lowercase)
        id: img
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "web=${{ env.REGISTRY }}/${owner}/novatrix-web" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.web }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  worker:
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (github.event_name == 'release' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Registry image name (lowercase)
        id: img
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "worker=${{ env.REGISTRY }}/${owner}/novatrix-worker" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.img.outputs.worker }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          target: novatrix-worker
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
