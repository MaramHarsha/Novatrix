# Installed by scripts/ubuntu/setup-ubuntu.sh (INSTALL_NGINX=1).
# Reverse-proxy Novatrix (Next.js on 127.0.0.1:3000) on port 80 — no TLS until you run certbot.
# For a real domain, replace server_name or copy from novatrix.conf.example.

upstream novatrix_next {
  server 127.0.0.1:3000;
  keepalive 64;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  location / {
    proxy_pass http://novatrix_next;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
    proxy_cache off;
  }
}
