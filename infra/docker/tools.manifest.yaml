# Tool inventory for agent / operators (extend over time)
tier: T1
tools:
  - name: nuclei
    binary: nuclei
    license: MIT
    source: https://github.com/projectdiscovery/nuclei
  - name: httpx
    binary: httpx
    license: MIT
    source: https://github.com/projectdiscovery/httpx
  - name: subfinder
    binary: subfinder
    license: MIT
    source: https://github.com/projectdiscovery/subfinder
  - name: katana
    binary: katana
    license: MIT
    source: https://github.com/projectdiscovery/katana
  - name: dnsx
    binary: dnsx
    license: MIT
    source: https://github.com/projectdiscovery/dnsx
  - name: ffuf
    binary: ffuf
    license: MIT
    source: https://github.com/ffuf/ffuf
  - name: sqlmap
    binary: sqlmap
    license: GPL-2.0
    source: https://github.com/sqlmapproject/sqlmap
wordlists:
  - name: SecLists
    note: Mount read-only at /wordlists/seclists when needed

# Optional full offensive image (community); see docs/EXEGOL.md in repo
exegol_agent_hint: Optional Exegol Docker image nwodtuhs/exegol (tags free, full, web, ad, light, osint, nightly) provides 400+ tools upstream; set SANDBOX_IMAGE and SANDBOX_MODE=docker. https://exegol.readthedocs.io/
