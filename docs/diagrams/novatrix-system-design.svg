<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" role="img" aria-labelledby="svgTitle svgDesc">
  <title id="svgTitle">Novatrix system design</title>
  <desc id="svgDesc">Browser to Next.js API, agent, LLM, dispatchTool, sandbox, HTTP targets, and PostgreSQL.</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .b { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 6; }
      .db { fill: #14532d; stroke: #166534; }
      .ex { fill: #1e3a5f; stroke: #2563eb; }
      .t { fill: #e2e8f0; font: 13px ui-sans-serif, system-ui, sans-serif; }
      .s { fill: #94a3b8; font: 11px ui-sans-serif, system-ui, sans-serif; }
      .ln { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
  </defs>
  <rect width="780" height="500" fill="#020617"/>

  <rect class="b" x="270" y="20" width="240" height="46"/>
  <text class="t" x="390" y="45" text-anchor="middle">Browser</text>
  <text class="s" x="390" y="60" text-anchor="middle">Chat, panels, LLM and sandbox settings</text>

  <rect class="b" x="230" y="96" width="320" height="50"/>
  <text class="t" x="390" y="122" text-anchor="middle">Next.js App Router</text>
  <text class="s" x="390" y="138" text-anchor="middle">API routes, SSE, sessions and messages</text>
  <line class="ln" x1="390" y1="66" x2="390" y2="96"/>

  <rect class="db" x="590" y="96" width="150" height="50"/>
  <text class="t" x="665" y="122" text-anchor="middle">PostgreSQL</text>
  <text class="s" x="665" y="138" text-anchor="middle">Prisma, sessions, runs</text>
  <line class="ln" x1="550" y1="121" x2="590" y2="121"/>
  <text class="s" x="570" y="112" text-anchor="middle">persist</text>

  <rect class="b" x="270" y="184" width="240" height="46"/>
  <text class="t" x="390" y="209" text-anchor="middle">Agent</text>
  <text class="s" x="390" y="224" text-anchor="middle">runAgentTurn, runAgentTurnAnthropic</text>
  <line class="ln" x1="390" y1="146" x2="390" y2="184"/>

  <rect class="ex" x="40" y="184" width="170" height="46"/>
  <text class="t" x="125" y="209" text-anchor="middle">LLM APIs</text>
  <text class="s" x="125" y="224" text-anchor="middle">OpenAI, Anthropic</text>
  <line class="ln" x1="270" y1="207" x2="210" y2="207"/>

  <rect class="b" x="270" y="260" width="240" height="46"/>
  <text class="t" x="390" y="285" text-anchor="middle">dispatchTool</text>
  <text class="s" x="390" y="300" text-anchor="middle">terminal, http, browser, files, findings</text>
  <line class="ln" x1="390" y1="230" x2="390" y2="260"/>

  <rect class="b" x="70" y="352" width="210" height="46"/>
  <text class="t" x="175" y="377" text-anchor="middle">Sandbox</text>
  <text class="s" x="175" y="392" text-anchor="middle">Docker or mock, workspace</text>

  <rect class="b" x="500" y="352" width="210" height="46"/>
  <text class="t" x="605" y="377" text-anchor="middle">Allowlisted targets</text>
  <text class="s" x="605" y="392" text-anchor="middle">http_request, browser_navigate</text>

  <path class="ln" d="M 390 306 L 390 332 L 175 332 L 175 352"/>
  <path class="ln" d="M 390 306 L 390 332 L 605 332 L 605 352"/>

  <text class="s" x="24" y="468" fill="#64748b" style="font:12px ui-sans-serif,system-ui,sans-serif">Novatrix high-level path. Optional Redis worker not shown.</text>
</svg>
